name: Auto-Update README

on:
  push:
    branches: [main]          # runs when you push anything to main
  schedule:
    - cron: "0 */6 * * *"     # also runs every 6 hours automatically
  workflow_dispatch:           # allows manual trigger from GitHub Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run README generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # auto-provided by GitHub
          GITHUB_USERNAME: MuhammadMustafa23
          LINKEDIN_URL: https://www.linkedin.com/in/muhammad-mustafa-ab5b273a9/
        run: python generate_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update README [skip ci]"
          git push
